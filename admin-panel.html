<!DOCTYPE html>
<html>
<head>
  <title>TickOrder Admin Panel</title>
  <link rel="stylesheet" href="admin.css">
</head>

<body>

<div class="header">
  ✅ TickOrder Admin Panel
</div>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="menu-item" onclick="loadPage('orders.html')">Orders</div>
    <div class="menu-item" onclick="loadPage('employees.html')">Employees</div>
    <div class="menu-item" onclick="loadPage('stock.html')">Stock</div>
    <div class="menu-item" onclick="loadPage('finance.html')">Finance</div>
    <div class="menu-item" onclick="loadPage('reseller.html')">Reseller</div>
    <div class="menu-item" onclick="loadPage('promotions.html')">Promotions</div>

  </div>

  <!-- MAIN -->
  <div class="main">
    <div id="content" class="card">
      Welcome to TickOrder Admin Dashboard
    </div>
  </div>

</div>

<script>
function loadPage(url) {
  document.getElementById("content").innerHTML =
    '<iframe src="' + url + '"></iframe>';
}
</script>

</body>
</html>
