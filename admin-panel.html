<!DOCTYPE html>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f5;
    }

    /* HEADER */
    .header {
      background: #0bbf63;
      color: white;
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
    }

    /* LAYOUT */
    .container {
      display: flex;
      height: 100vh;
    }

    /* SIDEBAR MENU */
    .sidebar {
      width: 230px;
      background: white;
      border-right: 1px solid #ddd;
      padding-top: 20px;
    }

    .menu-item {
      padding: 15px 20px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
      font-weight: bold;
    }

    .menu-item:hover {
      background: #e8f7ef;
      color: #0bbf63;
    }

    /* MAIN PANEL */
    .main {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      height: 100%;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>
