  function addEmployee() {

      joinedAt: firebase.firestore.FieldValue.serverTimestamp()

      snapshot.ref.getDownloadURL().then(downloadURL => {
        saveEmployee(downloadURL);
      });
    }).catch(error => {
      console.error("Upload error:", error);
      alert("Image upload failed.");
    });

  } else {
    saveEmployee();
  }

  function generateButtons(order, orderId) {

  const status = order.fulfillmentStatus || "awaiting_confirmation";

  if (status === "awaiting_confirmation") {
    return `<button onclick="updateFulfillmentStatus('${orderId}', 'confirmed')">Confirm</button>`;
  }

  if (status === "confirmed") {
    return `<button onclick="updateFulfillmentStatus('${orderId}', 'packaged')">Package</button>`;
  }

  if (status === "packaged") {
    return `<button onclick="updateFulfillmentStatus('${orderId}', 'shipped')">Ship</button>`;
  }

  if (status === "shipped") {
    return `<button onclick="updateFulfillmentStatus('${orderId}', 'delivered')">Deliver</button>`;
  }

  return "";
}

let currentFilter = "all";
  
function loadOrders(filter) {
  currentFilter = filter; // update global filter
  const ordersDiv = document.getElementById("ordersList");

  if (!ordersDiv) return;

  ordersDiv.innerHTML = `<p>Loading ${filter} orders...</p>`;

  let query = db.collection("orders");

if (filter === "all") {

} else {
  query = db.collection("orders").where("status", "==", filter);
}
  query.get().then(snapshot => {
    if (snapshot.empty) {
      ordersDiv.innerHTML = "<p>No orders found.</p>";
      return;

    snapshot.forEach(doc => {

// Export orders respecting current filter
function exportFilteredOrders(filter) {
  let query = db.collection("orders");
  if(filter !== "all") query = query.where("status", "==", filter);

  query.get().then(snapshot => {
    if(snapshot.empty){ 
      alert("No orders to export"); 
      return; 
    }

    const rows = [];
    snapshot.forEach(doc => {
      const order = doc.data();
      rows.push({
        "Order ID": doc.id,
        "Customer": order.name || "",
        "Email": order.email || "",
        "Address": order.address || "",
        "Total": order.total || 0,
        "Payment": order.paymentStatus || "",
        "Status": order.status || "",
        "Ordered At": order.createdAt ? order.createdAt.toDate().toLocaleString() : "N/A"
      });
    });

    // Build CSV string
    const csvContent = [
      Object.keys(rows[0]).join(","), // header
      ...rows.map(r => Object.values(r).map(v => `"${v}"`).join(",")) // quote values
    ].join("\n");

    // Trigger download
    const blob = new Blob([csvContent], {type:"text/csv"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `TickOrder_${filter}_Orders.csv`;
    a.click();
    URL.revokeObjectURL(url);
  });
}

      previewImg.src = e.target.result; // show selected image
    }
    reader.readAsDataURL(fileInput.files[0]);
  }
}

  function searchEmployees() {
  const query = document.getElementById("empSearch").value.toLowerCase();
  const employeesDiv = document.getElementById("employeesList");
  const allEmployees = employeesDiv.querySelectorAll("div[onclick^='openEmployee']");

  allEmployees.forEach(empDiv => {
    const name = empDiv.querySelector("p strong").textContent.toLowerCase();
    const email = empDiv.querySelectorAll("p")[1].textContent.toLowerCase();
    const position = empDiv.querySelectorAll("p")[2].textContent.toLowerCase();

    if(name.includes(query) || email.includes(query) || position.includes(query)) {
      empDiv.style.display = "flex";
    } else {
      empDiv.style.display = "none";
    }
  });
    }

  function addProduct(){

  const name = document.getElementById("productName").value;
  const price = parseFloat(document.getElementById("productPrice").value);
  const stockQty = parseInt(document.getElementById("productStock").value);
  const imageFile = document.getElementById("productImage").files[0];

  if(!name || !price || !stockQty){
    alert("Fill all fields");
    return;
  }

  function saveProduct(imageURL=""){

    db.collection("products").add({
      name:name,
      price:price,
      stock:stockQty,
      imageURL:imageURL,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(()=>{
      alert("Product added successfully");
      loadStock();
    });

  }

  if(imageFile){

    const storageRef = storage.ref("product_images/"+Date.now()+"_"+imageFile.name);

    storageRef.put(imageFile)
    .then(snapshot => snapshot.ref.getDownloadURL())
    .then(url=>{
      saveProduct(url);
    });

  }else{
    saveProduct();
  }

  }

  function loadStock() {
  const stockDiv = document.getElementById("stockList");
  if (!stockDiv) return;

  stockDiv.innerHTML = "Loading products...";

  db.collection("products").get().then(snapshot => {
    if (snapshot.empty) {
      stockDiv.innerHTML = "No products added yet.";
      return;
    }

    let html = "";

    snapshot.forEach(doc => {
      const p = doc.data();

      // Add data attributes instead of inline onclick
      html += `
<div style="background:white;padding:15px;margin-bottom:10px;border-radius:8px;display:flex;align-items:center;gap:15px;">
  <img src="${p.imageURL || 'https://via.placeholder.com/80'}"
       style="width:80px;height:80px;object-fit:cover;border-radius:6px;">

  <div style="flex:1;">
    <p><strong>${p.name}</strong></p>
    <p>Price: R${p.price}</p>
    <p>Stock: ${p.stock}</p>
  </div>

  <div>
    <button class="edit-btn"
            data-id="${doc.id}" 
            data-name="${p.name}" 
            data-price="${p.price}" 
            data-stock="${p.stock}"
            style="background:#1976d2;color:white;border:none;padding:6px 12px;border-radius:5px;margin-right:5px;">
      Edit
    </button>

    <button class="delete-btn"
            data-id="${doc.id}"
            style="background:#e53935;color:white;border:none;padding:6px 12px;border-radius:5px;">
      Delete
    </button>
  </div>
</div>
`;
    });

    stockDiv.innerHTML = html;

    // Attach listeners AFTER the HTML is in the page
    document.querySelectorAll(".edit-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        editProduct(
          btn.dataset.id,
          btn.dataset.name,
          btn.dataset.price,
          btn.dataset.stock
        );
      });
    });

    document.querySelectorAll(".delete-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        deleteProduct(btn.dataset.id);
      });
    });

  }).catch(err => {
    console.error("Error loading stock:", err);
    stockDiv.innerHTML = "Failed to load products.";
  });
  }

  function searchStock(){

  const search = document.getElementById("stockSearch").value.toLowerCase();

  const cards = document.querySelectorAll("#stockList div");

  cards.forEach(card=>{
    const text = card.innerText.toLowerCase();
    card.style.display = text.includes(search) ? "flex" : "none";
  });

  }

  function deleteProduct(id){

  if(!confirm("Delete this product?")) return;

  db.collection("products").doc(id).delete()
  .then(()=>{
    alert("Product deleted");
    loadStock();
  });

        }

        function editProduct(id,name,price,stock){

  const newName = prompt("Edit product name", name);
  if(newName === null) return;

  const newPrice = prompt("Edit price", price);
  if(newPrice === null) return;

  const newStock = prompt("Edit stock", stock);
  if(newStock === null) return;

  db.collection("products").doc(id).update({
    name:newName,
    price:parseFloat(newPrice),
    stock:parseInt(newStock)
  })
  .then(()=>{
    alert("Product updated");
    loadStock();
  });

  }

  function saveStockSettings() {
  const lowStockThreshold = parseInt(document.getElementById("lowStockThreshold").value);
  const outOfStockBehavior = document.getElementById("outOfStockBehavior").value;
  const notifyAdmin = document.getElementById("notifyAdmin").checked;
  const displayStock = document.getElementById("displayStock").checked;
  const enableStockTracking = document.getElementById("enableStockTracking").checked;

  if (isNaN(lowStockThreshold)) {
    alert("Please enter a valid number for Low Stock Threshold.");
    return;
  }

  stockSettingsRef.set({
    lowStockThreshold,
    outOfStockBehavior,
    notifyAdmin,
    displayStock,
    enableStockTracking
  })
  .then(() => {
    alert("Stock settings saved successfully!");
  })
  .catch(err => {
    console.error("Error saving stock settings:", err);
    alert("Failed to save stock settings. Check console.");
  });
}
</script>
