<!DOCTYPE html>
<html>
<head>
  <title>TickOrder Admin Panel</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f5;
    }

    /* HEADER */
    .header {
      background: #0bbf63;
      color: white;
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
    }

    /* LAYOUT */
    .container {
      display: flex;
      height: 100vh;
    }

    /* SIDEBAR MENU */
    .sidebar {
      width: 230px;
      background: white;
      border-right: 1px solid #ddd;
      padding-top: 20px;
    }

    .menu-item {
      padding: 15px 20px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
      font-weight: bold;
    }

    .menu-item:hover {
      background: #e8f7ef;
      color: #0bbf63;
    }

    /* MAIN PANEL */
    .main {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      height: 100%;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="header">
  ✅ TickOrder Admin Panel
</div>

<div class="container">

  <!-- LEFT MENU -->
  <div class="sidebar">

    <div class="menu-item" onclick="loadOrdersSection()">
      Orders
    </div>

    <div class="menu-item" onclick="loadEmployeesSection()">
      Employees
    </div>

    <div class="menu-item" onclick="showSection('stock')">
      Stock
    </div>

    <div class="menu-item" onclick="showSection('finance')">
      Finance
    </div>

    <div class="menu-item" onclick="showSection('reseller')">
      Reseller / Dropship
    </div>

    <div class="menu-item" onclick="showSection('promotions')">
      On Sale / Promotions
    </div>

  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <div id="content" class="card">
      Welcome to TickOrder Admin Dashboard
    </div>

  </div>

</div>

<script>
// Function to load a full page inside the main panel
function loadPage(url) {
  const content = document.getElementById("content");
  content.innerHTML = '<iframe src="' + url + '"></iframe>';
}

// Function for other sections
function showSection(section) {
  const content = document.getElementById("content");
  content.innerHTML = "<h2>" + section.toUpperCase() + "</h2><p>Section loading...</p>";
}

  function loadOrdersSection() {
  const content = document.getElementById("content");

  content.innerHTML = `
    <h2>Orders</h2>
    <div style="margin-bottom:20px;">
      <button onclick="loadOrders('all')">All</button>
      <button onclick="loadOrders('pending')">Pending</button>
      <button onclick="loadOrders('shipped')">Shipped</button>
      <button onclick="loadOrders('delivered')">Delivered</button>
      <button onclick="loadOrders('unpaid')">Unpaid</button>
    </div>

    <div style="margin-bottom:10px;">
      <button onclick="exportFilteredOrders('all')">Export All Orders</button>
      <button onclick="exportFilteredOrders('pending')">Export Pending</button>
      <button onclick="exportFilteredOrders('shipped')">Export Shipped</button>
      <button onclick="exportFilteredOrders('delivered')">Export Delivered</button>
      <button onclick="exportFilteredOrders('unpaid')">Export Unpaid</button>
    </div>

    <div id="ordersList"></div>
  `;

    const ordersDiv = document.getElementById("ordersList");

  loadOrders("all"); // default load all orders
}

 function loadEmployeesSection() {
  const content = document.getElementById("content");

  content.innerHTML = `
    <h2>Employees</h2>

    <div style="margin-bottom:20px;">
      <button onclick="loadEmployees('all')">All Employees</button>
      <button onclick="loadEmployees('active')">Active</button>
      <button onclick="loadEmployees('inactive')">Inactive</button>
      <button onclick="exportEmployees('all')">Export All</button>
    </div>

    <div id="employeesList"></div>
  `;

  loadEmployees('all'); // default view
  } 

  function loadEmployees(filter) {
  const employeesDiv = document.getElementById("employeesList");
  employeesDiv.innerHTML = `<p>Loading ${filter} employees...</p>`;

  // Here you will connect to Firestore like you did for orders later
}

function exportEmployees(filter) {
  // Logic to export filtered employee list to CSV
  alert("Export " + filter + " employees - To be implemented");
}
</script>

</body>
</html>
