function loadEmployees(filter) {
  const employeesDiv = document.getElementById("employeesList");
  employeesDiv.innerHTML = `<p>Loading ${filter} employees...</p>`;

  let query = db.collection("employees");

  if (filter === "active") {
    query = query.where("status", "==", "active");
  } else if (filter === "inactive") {
    query = query.where("status", "==", "inactive");
  }

  query.get().then(snapshot => {
    console.log("Snapshot size:", snapshot.size); // <-- debug
    if (snapshot.empty) {
      employeesDiv.innerHTML = "<p>No employees found.</p>";
      return;
    }

    let html = "";
    snapshot.forEach(doc => {
      const emp = doc.data();
      console.log(emp); // <-- debug to see employee data
      
      const bgColor = emp.status === "active" ? "#e8f7ef" : "#fbeaea";
      const photo = emp.photoURL ? emp.photoURL : "https://via.placeholder.com/80"; // placeholder if no photo

html += `
  <div onclick="openEmployee('${doc.id}')" 
     style="background:${bgColor}; padding:15px; margin-bottom:10px; border-radius:8px; display:flex; align-items:center; cursor:pointer;">
    <img src="${photo}" alt="Profile" style="width:80px; height:80px; border-radius:50%; margin-right:15px; object-fit:cover; border:2px solid #0bbf63;" />
    <div style="flex:1;">
      <p><strong>Name:</strong> ${emp.name}</p>
      <p><strong>Email:</strong> ${emp.email}</p>
      <p><strong>Position:</strong> ${emp.position}</p>
      <p><strong>Joined:</strong> ${
  emp.joinedAt ? emp.joinedAt.toDate().toLocaleDateString() : "Pending..."
}</p>
    </div>
    <div style="text-align:right;">
      <button 
        style="background:${emp.status === 'active' ? '#f44336' : '#0bbf63'}; color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer;"
        onclick="toggleEmployeeStatus('${doc.id}', '${emp.status}')">
        ${emp.status === 'active' ? 'Deactivate' : 'Activate'}
      </button>
    </div>
  </div>
`;
    });

    employeesDiv.innerHTML = html;
  }).catch(error => {
    console.error("Error loading employees:", error);
    employeesDiv.innerHTML = "<p>Error loading employees. Check console.</p>";
  });
}

  function updateEmployee(empId) {

  const name = document.getElementById("editName").value;
  const email = document.getElementById("editEmail").value;
  const position = document.getElementById("editPosition").value;

  db.collection("employees").doc(empId).update({
    name: name,
    email: email,
    position: position
  }).then(() => {
    alert("Employee updated successfully");
    loadEmployeesSection();
  }).catch(error => {
    console.error(error);
    alert("Update failed");
  });
}
  
  function toggleEmployeeStatus(empId, currentStatus) {

    loadEmployees('all');

  function addEmployee() {
  const name = document.getElementById("empName").value;
  const email = document.getElementById("empEmail").value;
  const position = document.getElementById("empPosition").value;
  const photoFile = document.getElementById("empPhoto").files[0];

  if (!name || !email || !position) {
    alert("Fill all fields");
    return;
  }

  function saveEmployee(photoURL = "") {
    db.collection("employees").add({
      name: name,
      email: email,
      position: position,
      status: "active",
      photoURL: photoURL,
      joinedAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
      alert("Employee Added!");
      loadEmployees('all');
    });
  }

  if (photoFile) {
    const storageRef = storage.ref("employee_photos/" + Date.now() + "_" + photoFile.name);
    
    storageRef.put(photoFile).then(snapshot => {
      snapshot.ref.getDownloadURL().then(downloadURL => {
        saveEmployee(downloadURL);
      });
    }).catch(error => {
      console.error("Upload error:", error);
      alert("Image upload failed.");
    });

  } else {
    saveEmployee();
  }
}

  function generateButtons(order, orderId) {

  const status = order.fulfillmentStatus || "awaiting_confirmation";

  if (status === "awaiting_confirmation") {
    return `<button onclick="updateFulfillmentStatus('${orderId}', 'confirmed')">Confirm</button>`;
  }

  if (status === "confirmed") {
    return `<button onclick="updateFulfillmentStatus('${orderId}', 'packaged')">Package</button>`;
  }

  if (status === "packaged") {
    return `<button onclick="updateFulfillmentStatus('${orderId}', 'shipped')">Ship</button>`;
  }

  if (status === "shipped") {
    return `<button onclick="updateFulfillmentStatus('${orderId}', 'delivered')">Deliver</button>`;
  }

  return "";
}

  function setFilter(button, filter){

  button.style.background="#0bbf63";
  button.style.color="white";

  loadOrders(filter);
}

// ORDERS SYSTEM

let currentFilter = "all";
  
function loadOrders(filter) {
  currentFilter = filter; // update global filter
  const ordersDiv = document.getElementById("ordersList");

  if (!ordersDiv) return;

  ordersDiv.innerHTML = `<p>Loading ${filter} orders...</p>`;

  let query = db.collection("orders");

  if (filter !== "all") {
    query = query.where("status", "==", filter);
  }

  query.get().then(snapshot => {
    if (snapshot.empty) {
      ordersDiv.innerHTML = "<p>No orders found.</p>";
      return;
    }

    let html = "";

    snapshot.forEach(doc => {
      const order = doc.data();
      const createdAt = order.createdAt ? order.createdAt.toDate().toLocaleString() : "N/A";

      // Status colors
      let bgColor = "#ffffff";
      if(order.status === "pendingConfirmation") bgColor = "#f8d7da";
      else if(order.status === "confirmed") bgColor = "#fff3cd";
      else if(order.status === "shipped") bgColor = "#d1ecf1";
      else if(order.status === "delivered") bgColor = "#d4edda";

      html += `
        <div style="background:${bgColor}; padding:15px; margin-bottom:12px; border:1px solid #ddd; border-radius:8px; cursor:pointer;" onclick="openOrder('${doc.id}')">
          <p><strong>Order ID:</strong> ${doc.id}</p>
          <p><strong>Customer:</strong> ${order.name || "N/A"}</p>
          <p><strong>Email:</strong> ${order.email || "N/A"}</p>
          <p><strong>Address:</strong> ${order.address || "N/A"}</p>
          <p><strong>Total:</strong> R${order.total || 0}</p>
          <p><strong>Payment:</strong> ${order.paymentStatus || "N/A"}</p>
          <p><strong>Status:</strong> ${order.status || "N/A"}</p>
          <p><strong>Ordered At:</strong> ${createdAt}</p>
        </div>
      `;
    });

    ordersDiv.innerHTML = html;

  }).catch(error => {
    console.error("Error loading orders:", error);
    ordersDiv.innerHTML = "<p>Error loading orders. Check console.</p>";
  });
}

// Open full order view with items and pictures
function openOrder(orderId) {
  db.collection("orders").doc(orderId).get().then(doc => {
    if(!doc.exists) {
      alert("Order not found");
      return;
    }

    const order = doc.data();
    const createdAt = order.createdAt ? order.createdAt.toDate().toLocaleString() : "N/A";

    let itemsHTML = "";
    if(order.items && order.items.length > 0){
      order.items.forEach(item => {
        itemsHTML += `
          <div style="display:flex; align-items:center; margin-bottom:10px;">
            <img src="${item.imageURL || 'https://via.placeholder.com/60'}" style="width:60px; height:60px; object-fit:cover; border-radius:5px; margin-right:10px;">
            <div>
              <p><strong>${item.name}</strong></p>
              <p>Price: R${item.price}</p>
              <p>Qty: ${item.quantity || 1}</p>
            </div>
          </div>
        `;
      });
    } else {
      itemsHTML = "<p>No items found</p>";
    }

    const content = document.getElementById("content");
    content.innerHTML = `
      <h2>Order ${orderId}</h2>
      <p><strong>Customer:</strong> ${order.name}</p>
      <p><strong>Email:</strong> ${order.email}</p>
      <p><strong>Address:</strong> ${order.address}</p>
      <p><strong>Total:</strong> R${order.total}</p>
      <p><strong>Payment:</strong> ${order.paymentStatus}</p>
      <p><strong>Status:</strong> ${order.status}</p>
      <p><strong>Ordered At:</strong> ${createdAt}</p>
      <h3>Items</h3>
      ${itemsHTML}
      <div style="margin-top:10px;">
        <button onclick="updateOrderStatus('${orderId}','confirmed')">Confirm</button>
        <button onclick="updateOrderStatus('${orderId}','shipped')">Shipped</button>
        <button onclick="updateOrderStatus('${orderId}','delivered')">Delivered</button>
      </div>
      <button style="margin-top:10px;" onclick="loadOrdersSection()">Back to Orders</button>
    `;
  });
}

// Export orders respecting current filter
function exportFilteredOrders(filter) {
  let query = db.collection("orders");
  if(filter !== "all") query = query.where("status", "==", filter);

  query.get().then(snapshot => {
    if(snapshot.empty){ 
      alert("No orders to export"); 
      return; 
    }

    const rows = [];
    snapshot.forEach(doc => {
      const order = doc.data();
      rows.push({
        "Order ID": doc.id,
        "Customer": order.name || "",
        "Email": order.email || "",
        "Address": order.address || "",
        "Total": order.total || 0,
        "Payment": order.paymentStatus || "",
        "Status": order.status || "",
        "Ordered At": order.createdAt ? order.createdAt.toDate().toLocaleString() : "N/A"
      });
    });

    // Build CSV string
    const csvContent = [
      Object.keys(rows[0]).join(","), // header
      ...rows.map(r => Object.values(r).map(v => `"${v}"`).join(",")) // quote values
    ].join("\n");

    // Trigger download
    const blob = new Blob([csvContent], {type:"text/csv"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `TickOrder_${filter}_Orders.csv`;
    a.click();
    URL.revokeObjectURL(url);
  });
}

  function updateFulfillmentStatus(orderId, newStatus) {
  db.collection("orders").doc(orderId).update({
    fulfillmentStatus: newStatus,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(() => {
    loadOrders("all");
  });
}

function updateOrderStatus(orderId, newStatus) {

  db.collection("orders").doc(orderId).update({
    status: newStatus
  }).then(() => {
    loadOrders(currentFilter);
  }).catch(error => {
    console.error("Error updating order:", error);
  });

}




function packageOrder(orderId) {
  const adminName = "Admin"; // later we make this dynamic

  db.collection("orders").doc(orderId).update({
    fulfillmentStatus: "packaged",
    packagedAt: firebase.firestore.FieldValue.serverTimestamp(),

}

function shipOrder(orderId) {
  db.collection("orders").doc(orderId).update({
    fulfillmentStatus: "shipped",
    shippedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(() => loadOrdersSection());
}

function deliverOrder(orderId) {
  db.collection("orders").doc(orderId).update({
    fulfillmentStatus: "delivered",
    deliveredAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(() => loadOrdersSection());
}

  function searchEmployees() {
  const query = document.getElementById("empSearch").value.toLowerCase();
  const employeesDiv = document.getElementById("employeesList");
  const allEmployees = employeesDiv.querySelectorAll("div[onclick^='openEmployee']");

  allEmployees.forEach(empDiv => {
    const name = empDiv.querySelector("p strong").textContent.toLowerCase();
    const email = empDiv.querySelectorAll("p")[1].textContent.toLowerCase();
    const position = empDiv.querySelectorAll("p")[2].textContent.toLowerCase();

    if(name.includes(query) || email.includes(query) || position.includes(query)) {
      empDiv.style.display = "flex";
    } else {
      empDiv.style.display = "none";
    }
  });
    }
