<!DOCTYPE html>
<html>
<head>
  <title>TickOrder Admin Panel</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f5;
    }

    /* HEADER */
    .header {
      background: #0bbf63;
      color: white;
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
    }

    /* LAYOUT */
    .container {
      display: flex;
      height: 100vh;
    }

    /* SIDEBAR MENU */
    .sidebar {
      width: 230px;
      background: white;
      border-right: 1px solid #ddd;
      padding-top: 20px;
    }

    .menu-item {
      padding: 15px 20px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
      font-weight: bold;
    }

    .menu-item:hover {
      background: #e8f7ef;
      color: #0bbf63;
    }

    /* MAIN PANEL */
    .main {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      height: 100%;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="header">
  ✅ TickOrder Admin Panel
</div>

<div class="container">

  <!-- LEFT MENU -->
  <div class="sidebar">

    <div class="menu-item" onclick="loadOrdersSection()">
      Orders
    </div>

    <div class="menu-item" onclick="loadEmployeesSection()">
      Employees
    </div>

    <div class="menu-item" onclick="showSection('stock')">
      Stock
    </div>

    <div class="menu-item" onclick="showSection('finance')">
      Finance
    </div>

    <div class="menu-item" onclick="showSection('reseller')">
      Reseller / Dropship
    </div>

    <div class="menu-item" onclick="showSection('promotions')">
      On Sale / Promotions
    </div>

  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <div id="content" class="card">
      Welcome to TickOrder Admin Dashboard
    </div>

  </div>

</div>

  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
  
<script>
  const firebaseConfig = {
  apiKey: "AIzaSyBhDQeyV9_REmBi0zjQQyawkDoaX7Ho544",
  authDomain: "tickorder-13b84.firebaseapp.com",
  projectId: "tickorder-13b84",
  storageBucket: "tickorder-13b84.firebasestorage.app",
  messagingSenderId: "288232701324",
  appId: "1:288232701324:web:ae43423dacecd9508f6aa9"
};


firebase.initializeApp(firebaseConfig);

// 2️⃣ Firestore and Auth references
const db = firebase.firestore();
const auth = firebase.auth();
  const storage = firebase.storage();
// Function to load a full page inside the main panel
function loadPage(url) {
  const content = document.getElementById("content");
  content.innerHTML = '<iframe src="' + url + '"></iframe>';
}

// Function for other sections
function showSection(section) {
  const content = document.getElementById("content");
  content.innerHTML = "<h2>" + section.toUpperCase() + "</h2><p>Section loading...</p>";
}

  function loadOrdersSection() {
  const content = document.getElementById("content");

  content.innerHTML = `
    <h2>Orders</h2>
    <div style="margin-bottom:20px;">
      <button onclick="loadOrders('all')">All</button>
      <button onclick="loadOrders('pending')">Pending</button>
      <button onclick="loadOrders('shipped')">Shipped</button>
      <button onclick="loadOrders('delivered')">Delivered</button>
      <button onclick="loadOrders('unpaid')">Unpaid</button>
    </div>

    <div style="margin-bottom:10px;">
      <button onclick="exportFilteredOrders('all')">Export All Orders</button>
      <button onclick="exportFilteredOrders('pending')">Export Pending</button>
      <button onclick="exportFilteredOrders('shipped')">Export Shipped</button>
      <button onclick="exportFilteredOrders('delivered')">Export Delivered</button>
      <button onclick="exportFilteredOrders('unpaid')">Export Unpaid</button>
    </div>

    <div id="ordersList"></div>
  `;

    const ordersDiv = document.getElementById("ordersList");

  loadOrders("all"); // default load all orders
}

 function loadEmployeesSection() {
  const content = document.getElementById("content");

  content.innerHTML = `
    <h2 style="color:#0bbf63;">Employees</h2>

     <div style="margin:20px 0; padding:15px; background:#f4f6f5; border-radius:8px;">
  <input id="empName" placeholder="Full Name" style="padding:8px; margin-right:5px;" />
  <input id="empEmail" placeholder="Email" style="padding:8px; margin-right:5px;" />
  <input id="empPosition" placeholder="Position" style="padding:8px; margin-right:5px;" />
  <input type="file" id="empPhoto" accept="image/*" style="margin-right:5px;" />
  <button 
    style="background:#0bbf63; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;"
    onclick="addEmployee()">
    Add Employee
  </button>
</div>

    <div style="margin-bottom:20px;">
      <button style="background:#0bbf63; color:white; border:none; padding:8px 15px; margin-right:5px; border-radius:5px; cursor:pointer;" onclick="loadEmployees('all')">All Employees</button>
      <button style="background:#0bbf63; color:white; border:none; padding:8px 15px; margin-right:5px; border-radius:5px; cursor:pointer;" onclick="loadEmployees('active')">Active</button>
      <button style="background:#0bbf63; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;" onclick="loadEmployees('inactive')">Inactive</button>
    </div>

    <div style="margin-bottom:10px;">
      <button style="background:#ffffff; color:#0bbf63; border:2px solid #0bbf63; padding:8px 15px; margin-right:5px; border-radius:5px; cursor:pointer;" onclick="exportEmployees('all')">Export All</button>
      <button style="background:#ffffff; color:#0bbf63; border:2px solid #0bbf63; padding:8px 15px; margin-right:5px; border-radius:5px; cursor:pointer;" onclick="exportEmployees('active')">Export Active</button>
      <button style="background:#ffffff; color:#0bbf63; border:2px solid #0bbf63; padding:8px 15px; border-radius:5px; cursor:pointer;" onclick="exportEmployees('inactive')">Export Inactive</button>
    </div>

    <div id="employeesList"></div>
  `;

  loadEmployees('all'); // default view
}

function loadEmployees(filter) {
  const employeesDiv = document.getElementById("employeesList");
  employeesDiv.innerHTML = `<p>Loading ${filter} employees...</p>`;

  let query = db.collection("employees");

  if (filter === "active") {
    query = query.where("status", "==", "active");
  } else if (filter === "inactive") {
    query = query.where("status", "==", "inactive");
  }

  query.get().then(snapshot => {
    console.log("Snapshot size:", snapshot.size); // <-- debug
    if (snapshot.empty) {
      employeesDiv.innerHTML = "<p>No employees found.</p>";
      return;
    }

    let html = "";
    snapshot.forEach(doc => {
      const emp = doc.data();
      console.log(emp); // <-- debug to see employee data
      
      const bgColor = emp.status === "active" ? "#e8f7ef" : "#fbeaea";
      const photo = emp.photoURL ? emp.photoURL : "https://via.placeholder.com/80"; // placeholder if no photo

html += `
  <div onclick="openEmployee('${doc.id}')" 
     style="background:${bgColor}; padding:15px; margin-bottom:10px; border-radius:8px; display:flex; align-items:center; cursor:pointer;">
    <img src="${photo}" alt="Profile" style="width:80px; height:80px; border-radius:50%; margin-right:15px; object-fit:cover; border:2px solid #0bbf63;" />
    <div style="flex:1;">
      <p><strong>Name:</strong> ${emp.name}</p>
      <p><strong>Email:</strong> ${emp.email}</p>
      <p><strong>Position:</strong> ${emp.position}</p>
      <p><strong>Joined:</strong> ${
  emp.joinedAt ? emp.joinedAt.toDate().toLocaleDateString() : "Pending..."
}</p>
    </div>
    <div style="text-align:right;">
      <button 
        style="background:${emp.status === 'active' ? '#f44336' : '#0bbf63'}; color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer;"
        onclick="toggleEmployeeStatus('${doc.id}', '${emp.status}')">
        ${emp.status === 'active' ? 'Deactivate' : 'Activate'}
      </button>
    </div>
  </div>
`;
    });

    employeesDiv.innerHTML = html;
  }).catch(error => {
    console.error("Error loading employees:", error);
    employeesDiv.innerHTML = "<p>Error loading employees. Check console.</p>";
  });
}

  function openEmployee(empId) {

  db.collection("employees").doc(empId).get().then(doc => {

    if (!doc.exists) {
      alert("Employee not found");
      return;
    }

    const emp = doc.data();
    const content = document.getElementById("content");

    content.innerHTML = `
      <h2>Edit Employee</h2>

      <div style="margin-bottom:15px;">
        <img src="${emp.photoURL || 'https://via.placeholder.com/120'}"
             style="width:120px; height:120px; border-radius:50%; object-fit:cover; border:3px solid #0bbf63;" />
      </div>

      <input id="editName" value="${emp.name}" style="display:block; margin-bottom:10px; padding:8px; width:300px;" />
      <input id="editEmail" value="${emp.email}" style="display:block; margin-bottom:10px; padding:8px; width:300px;" />
      <input id="editPosition" value="${emp.position}" style="display:block; margin-bottom:10px; padding:8px; width:300px;" />

      <button onclick="updateEmployee('${empId}')" 
              style="background:#0bbf63; color:white; padding:10px 20px; border:none; border-radius:5px;">
        Save Changes
      </button>

      <button onclick="loadEmployeesSection()" 
              style="margin-left:10px; padding:10px 20px;">
        Back
      </button>
    `;
  });
}

  function updateEmployee(empId) {

  const name = document.getElementById("editName").value;
  const email = document.getElementById("editEmail").value;
  const position = document.getElementById("editPosition").value;

  db.collection("employees").doc(empId).update({
    name: name,
    email: email,
    position: position
  }).then(() => {
    alert("Employee updated successfully");
    loadEmployeesSection();
  }).catch(error => {
    console.error(error);
    alert("Update failed");
  });
}
  
  function toggleEmployeeStatus(empId, currentStatus) {
  const newStatus = currentStatus === "active" ? "inactive" : "active";

  db.collection("employees").doc(empId).update({
    status: newStatus
  }).then(() => {
    loadEmployees('all');
  }).catch(err => {
    console.error(err);
    alert("Error updating employee status");
  });
  }
  
function exportEmployees(filter) {
  alert("Export " + filter + " employees - To be implemented");
}

  function addEmployee() {
  const name = document.getElementById("empName").value;
  const email = document.getElementById("empEmail").value;
  const position = document.getElementById("empPosition").value;
  const photoFile = document.getElementById("empPhoto").files[0];

  if (!name || !email || !position) {
    alert("Fill all fields");
    return;
  }

  function saveEmployee(photoURL = "") {
    db.collection("employees").add({
      name: name,
      email: email,
      position: position,
      status: "active",
      photoURL: photoURL,
      joinedAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
      alert("Employee Added!");
      loadEmployees('all');
    });
  }

  if (photoFile) {
    const storageRef = storage.ref("employee_photos/" + Date.now() + "_" + photoFile.name);
    
    storageRef.put(photoFile).then(snapshot => {
      snapshot.ref.getDownloadURL().then(downloadURL => {
        saveEmployee(downloadURL);
      });
    }).catch(error => {
      console.error("Upload error:", error);
      alert("Image upload failed.");
    });

  } else {
    saveEmployee();
  }
}

  // ===============================
// ORDERS SYSTEM
// ===============================

function loadOrders(filter) {

  const ordersDiv = document.getElementById("ordersList");

  if (!ordersDiv) return;

  ordersDiv.innerHTML = `<p>Loading ${filter} orders...</p>`;

  let query = db.collection("orders");

  if (filter !== "all") {
    query = query.where("status", "==", filter);
  }

  query.get().then(snapshot => {

    if (snapshot.empty) {
      ordersDiv.innerHTML = "<p>No orders found.</p>";
      return;
    }

    let html = "";

    snapshot.forEach(doc => {
      const order = doc.data();

      const bgColor =
        order.status === "pending" ? "#fff3cd" :
        order.status === "shipped" ? "#d1ecf1" :
        order.status === "delivered" ? "#d4edda" :
        order.status === "unpaid" ? "#f8d7da" :
        "#ffffff";

      html += `
  <div style="background:${bgColor}; padding:15px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
    <p><strong>Order ID:</strong> ${doc.id}</p>
    <p><strong>Customer:</strong> ${order.customerName || "N/A"} (${order.customerEmail || "N/A"})</p>
    <p><strong>Items:</strong> ${order.items ? order.items.length : 0}</p>
    <p><strong>Total:</strong> R${order.total || 0}</p>
    <p><strong>Status:</strong> ${order.status || "N/A"}</p>

    <div style="margin-top:10px;">
      <button onclick="updateOrderStatus('${doc.id}', 'pending')">Pending</button>
      <button onclick="updateOrderStatus('${doc.id}', 'shipped')">Shipped</button>
      <button onclick="updateOrderStatus('${doc.id}', 'delivered')">Delivered</button>
    </div>
  </div>
`;
    });

    ordersDiv.innerHTML = html;

  }).catch(error => {
    console.error("Error loading orders:", error);
    ordersDiv.innerHTML = "<p>Error loading orders. Check console.</p>";
  });
}


function updateOrderStatus(orderId, newStatus) {

  db.collection("orders").doc(orderId).update({
    status: newStatus
  }).then(() => {
    loadOrders("all");
  }).catch(error => {
    console.error("Error updating order:", error);
  });

}


function exportFilteredOrders(filter) {
  alert("Export feature coming next phase.");
  }
</script>

</body>
</html>
