<!DOCTYPE html>
<html>
<head>
  <title>TickOrder Admin Panel</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f5;
    }

    /* HEADER */
    .header {
      background: #0bbf63;
      color: white;
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
    }

    /* LAYOUT */
    .container {
      display: flex;
      height: 100vh;
    }

    /* SIDEBAR MENU */
    .sidebar {
      width: 230px;
      background: white;
      border-right: 1px solid #ddd;
      padding-top: 20px;
    }

    .menu-item {
      padding: 15px 20px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
      font-weight: bold;
    }

    .menu-item:hover {
      background: #e8f7ef;
      color: #0bbf63;
    }

    /* MAIN PANEL */
    .main {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<div class="header">
  ✅ TickOrder Admin Panel
</div>

<div class="container">

  <!-- LEFT MENU -->
  <div class="sidebar">

    <div class="menu-item" onclick="showSection('orders')">
      Orders
    </div>

    <div class="menu-item" onclick="showSection('employees')">
      Employees
    </div>

    <div class="menu-item" onclick="showSection('stock')">
      Stock
    </div>

    <div class="menu-item" onclick="showSection('finance')">
      Finance
    </div>

    <div class="menu-item" onclick="showSection('reseller')">
      Reseller / Dropship
    </div>

    <div class="menu-item" onclick="showSection('promotions')">
      On Sale / Promotions
    </div>

  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <div id="content" class="card">
      Welcome to TickOrder Admin Dashboard
    </div>

  </div>

</div>

<script>
function showSection(section) {
  const content = document.getElementById("content");

  content.innerHTML = "<h2>" + section.toUpperCase() + "</h2><p>Section loading...</p>";
}
</script>

</body>
</html>
