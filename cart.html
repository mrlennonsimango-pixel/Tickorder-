<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - TickOrder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>TickOrder</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="cart.html">Cart</a>
  </nav>
</header>

<section class="products" id="cart-items"></section>

<h2 id="total" style="text-align:center;"></h2>
<button onclick="goToCheckout()" style="display:block;margin:20px auto;padding:10px 20px;">
  Proceed to Checkout
</button>
  
<script>
const cart = JSON.parse(localStorage.getItem("tickorderCart")) || [];
const cartContainer = document.getElementById("cart-items");
const totalDisplay = document.getElementById("total");

let total = 0;

if (cart.length === 0) {
  cartContainer.innerHTML = "<p style='text-align:center;'>Your cart is empty.</p>";
} else {
  cart.forEach((item, index) => {
    total += item.price;

    const card = document.createElement("div");
    card.classList.add("product-card");

    card.innerHTML = `
      <h3>${item.name}</h3>
      <p>$${item.price}</p>
      <button onclick="removeItem(${index})">Remove</button>
    `;

    cartContainer.appendChild(card);
  });
}

totalDisplay.textContent = "Total: $" + total;

function removeItem(index) {
  cart.splice(index, 1);
  localStorage.setItem("tickorderCart", JSON.stringify(cart));
  location.reload();
}

function goToCheckout() {
  if (cart.length === 0) {
    alert("Your cart is empty!");
    return;
  }
  window.location.href = "checkout.html";
}
</script>

</body>
</html>
