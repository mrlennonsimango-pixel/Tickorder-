<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - TickOrder</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .cart-product {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: white;
      border-radius: 10px;
      padding: 10px 15px;
      margin: 10px auto;
      max-width: 400px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    .cart-product img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 5px;
      margin-right: 10px;
    }

    .cart-product button {
      background: #0f9d58;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    #total {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      margin-top: 20px;
      color: #0f9d58;
    }

    #checkoutBtn {
      display: block;
      margin: 20px auto;
      padding: 12px 25px;
      background: #0f9d58;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <h1>TickOrder</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="cart.html">Cart</a>
    <span id="cart-counter">Cart: 0</span>
  </nav>
</header>

<section id="cart-items"></section>
<h2 id="total"></h2>
<button id="checkoutBtn">Proceed to Checkout</button>

<script>
let cart = JSON.parse(localStorage.getItem("tickorderCart")) || [];
const cartContainer = document.getElementById("cart-items");
const totalDisplay = document.getElementById("total");
const cartCounter = document.getElementById("cart-counter");

function updateCartCounter() {
  const totalItems = cart.reduce((sum, item) => {
  return sum + (item.quantity || 1);
}, 0);

cartCounter.textContent = `Cart: ${totalItems}`;
}

function renderCart() {
  cartContainer.innerHTML = "";
  if (cart.length === 0) {
    cartContainer.innerHTML = "<p style='text-align:center;'>Your cart is empty.</p>";
    totalDisplay.textContent = "Total: R0";
    return;
  }

  let total = 0;

cart.forEach((item, index) => {

  // safe quantity support
  const qty = item.quantity || 1;

  const itemTotal = item.price * qty;

  total += itemTotal;
    const div = document.createElement("div");
    div.classList.add("cart-product");

    div.innerHTML = `
      <img src="${item.image}" alt="${item.name}" />
      <span>
  ${item.name}<br>
  Qty: ${item.quantity || 1} × R${item.price}
  <br>
  <b>Total: R${item.price * (item.quantity || 1)}</b>
</span>
      <button onclick="removeItem(${index})">Remove</button>
    `;

    cartContainer.appendChild(div);
  });

  totalDisplay.textContent = `Total: R${total}`;
}

   
function removeItem(index) {
  cart.splice(index, 1);
  localStorage.setItem("tickorderCart", JSON.stringify(cart));
  renderCart();
  updateCartCounter();
}

document.getElementById("checkoutBtn").addEventListener("click", () => {
  if (cart.length === 0) {
    alert("Your cart is empty!");
    return;
  }
  window.location.href = "checkout.html";
});

renderCart();
updateCartCounter();
</script>

</body>
  </html>
