<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - TickOrder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>TickOrder</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="cart.html">Cart</a>
  </nav>
</header>

<section style="padding:20px; max-width:500px; margin:auto;">
  <h2>Checkout</h2>

  <form id="checkout-form">
    <input type="text" placeholder="Full Name" required><br><br>
    <input type="email" placeholder="Email" required><br><br>
    <input type="text" placeholder="Address" required><br><br>
    <button type="submit">Place Order</button>
  </form>

  <h3 id="order-status" style="margin-top:20px;"></h3>
</section>

<script>
const cart = JSON.parse(localStorage.getItem("tickorderCart")) || [];

document.getElementById("checkout-form").addEventListener("submit", function(e) {
  e.preventDefault();

  if (cart.length === 0) {
    alert("Cart is empty!");
    return;
  }

  localStorage.removeItem("tickorderCart");

  document.getElementById("order-status").textContent =
    "Order placed successfully!";
});
</script>

</body>
                                                              </html>
