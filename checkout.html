<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - TickOrder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>TickOrder</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="cart.html">Cart</a>
  </nav>
</header>

<section style="padding:20px; max-width:500px; margin:auto;">
  <h2>Checkout</h2>

  <form id="checkout-form">
    <input type="text" placeholder="Full Name" required><br><br>
    <input type="email" placeholder="Email" required><br><br>
    <input type="text" placeholder="Address" required><br><br>
    <button type="submit">Place Order</button>
  </form>

  <h3 id="order-status" style="margin-top:20px;"></h3>
</section>

  <!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
  // Firebase config — copy exactly from your Firebase console
  const firebaseConfig = {
    apiKey: "AIzaSyBhDQeyV9_REmBi0zjQQyawkDoaX7Ho544",
    authDomain: "tickorder-13b84.firebaseapp.com",
    projectId: "tickorder-13b84",
    storageBucket: "tickorder-13b84.firebasestorage.app",
    messagingSenderId: "288232701324",
    appId: "1:288232701324:web:ae43423dacecd9508f6aa9"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
</script>
  
<script>
const cart = JSON.parse(localStorage.getItem("tickorderCart")) || [];

document.getElementById("checkout-form").addEventListener("submit", function(e) {
  e.preventDefault();

  if (cart.length === 0) {
    alert("Cart is empty!");
    return;
  }

  const name = e.target[0].value;
  const email = e.target[1].value;
  const address = e.target[2].value;

  db.collection("orders").add({
  name: name,
  email: email,
  address: address,
  items: cart,
  total: cart.reduce((sum, item) => sum + item.price, 0),
  status: "pending",
  paymentStatus: "unpaid",
  createdAt: firebase.firestore.FieldValue.serverTimestamp()
})
  .then(() => {
    localStorage.removeItem("tickorderCart");
    document.getElementById("order-status").textContent = "Order placed successfully!";
  })
  .catch((error) => {
    console.error("Error adding order: ", error);
    alert("Failed to place order. Try again.");
  });
});
</script>>

</body>
                                                              </html>
