<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - TickOrder</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f2f2f2;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0f9d58;
      color: white;
      padding: 15px 20px;
    }

    header h1 {
      margin: 0;
      font-size: 22px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 15px;
      font-weight: bold;
    }

    nav a:hover {
      opacity: 0.8;
    }

    section.checkout-container {
      max-width: 500px;
      margin: 30px auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    section.checkout-container h2 {
      text-align: center;
      color: #0f9d58;
      margin-bottom: 20px;
    }

    section.checkout-container input {
      width: 100%;
      padding: 12px 15px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 16px;
    }

    section.checkout-container button {
      width: 100%;
      background: #0f9d58;
      color: white;
      padding: 14px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: opacity 0.2s;
    }

    section.checkout-container button:hover {
      opacity: 0.9;
    }

    #order-status {
      text-align: center;
      margin-top: 20px;
      color: #0f9d58;
      font-weight: bold;
    }
  </style>
</head>
<body>

<header>
  <h1>TickOrder</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="cart.html">🛒 Cart</a>
  </nav>
</header>

<section class="checkout-container">
  <h2>Checkout</h2>
  <form id="checkout-form">
    <input type="text" id="name" placeholder="Full Name" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="tel" id="phone" placeholder="+27 600 123 456" required>

    <!-- PAXI Store -->
    <input type="text" id="paxi-store" placeholder="Enter PEP PAXI pickup store (e.g., PEP Tzaneen Crossing)" required>

    <p style="font-size:13px;">
      Not sure which store? 
      <a href="https://www.paxi.co.za/paxi-points" target="_blank">
      Find your nearest PAXI pickup point
      </a>
    </p>

    <!-- Delivery Option -->
    <select id="delivery" required>
      <option value="">Select Delivery Speed</option>
      <option value="standard">Standard (7–9 days)</option>
      <option value="express">Express (3–5 days)</option>
    </select>

    <!-- Total Display -->
    <div id="final-total" style="margin:10px 0; font-weight:bold;"></div>

    <button type="submit">Place Order</button>
  </form>

  <div id="order-status"></div>
</section>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyBhDQeyV9_REmBi0zjQQyawkDoaX7Ho544",
    authDomain: "tickorder-13b84.firebaseapp.com",
    projectId: "tickorder-13b84",
    storageBucket: "tickorder-13b84.firebasestorage.app",
    messagingSenderId: "288232701324",
    appId: "1:288232701324:web:ae43423dacecd9508f6aa9"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const cart = JSON.parse(localStorage.getItem("tickorderCart")) || [];
  const orderStatus = document.getElementById("order-status");

const deliverySelect = document.getElementById("delivery");
const finalTotalDisplay = document.getElementById("final-total");

function updateTotal() {

  const deliveryType = deliverySelect.value;
  const itemsTotal = cart.reduce((sum, item) => sum + item.price, 0);

  const totalWeight = cart.length; // each product = 1kg
  let packageType = (totalWeight <= 5) ? "standard" : "large";

  let deliveryCost = 0;

  if (packageType === "standard") {
    deliveryCost = (deliveryType === "standard") ? 60 : 110;
  } else {
    deliveryCost = (deliveryType === "standard") ? 110 : 140;
  }

  const totalCost = itemsTotal + deliveryCost;

  finalTotalDisplay.textContent =
  `Items: R${itemsTotal} | Delivery: R${deliveryCost} | Total: R${totalCost}`;
}

deliverySelect.addEventListener("change", updateTotal);
updateTotal();
  
  // --- Cart Summary ---
const checkoutContainer = document.querySelector(".checkout-container");
const summaryDiv = document.createElement("div");
summaryDiv.style.background = "#f0f0f0";
summaryDiv.style.padding = "15px";
summaryDiv.style.borderRadius = "8px";
summaryDiv.style.marginBottom = "20px";

if (cart.length === 0) {
  summaryDiv.innerHTML = "<p>Your cart is empty.</p>";
} else {
  let total = 0;
  cart.forEach(item => {
    total += item.price;
    const itemDiv = document.createElement("div");
    itemDiv.style.display = "flex";
    itemDiv.style.justifyContent = "space-between";
    itemDiv.style.marginBottom = "5px";
    itemDiv.textContent = `${item.name} - R${item.price}`;
    summaryDiv.appendChild(itemDiv);
  });

  const totalDiv = document.createElement("div");
  totalDiv.style.textAlign = "right";
  totalDiv.style.fontWeight = "bold";
  totalDiv.style.marginTop = "10px";
  totalDiv.textContent = `Total: R${total}`;
  summaryDiv.appendChild(totalDiv);
}

// Insert cart summary above form
checkoutContainer.insertBefore(summaryDiv, document.getElementById("checkout-form"));
  
  document.getElementById("checkout-form").addEventListener("submit", function(e) {
    e.preventDefault();

    if (cart.length === 0) {
      alert("Your cart is empty!");
      return;
    }

const name = document.getElementById("name").value;
const email = document.getElementById("email").value;
const phone = document.getElementById("phone").value;
const paxiStore = document.getElementById("paxi-store").value;

    // Step 2: Get selected delivery option
const deliveryType = document.getElementById("delivery").value; // standard or express

// Step 2a: Calculate total weight of items in cart
// For now, assume each item has weight property; if not, default 1kg
const totalWeight = cart.reduce((sum, item) => sum + (item.weight || 1), 0);

// Step 2b: Determine package type based on weight
let packageType = (totalWeight <= 5) ? "standard" : "large";

// Step 2c: Determine PAXI cost (rounded amounts)
let deliveryCost = 0;
if (packageType === "standard") {
  deliveryCost = (deliveryType === "standard") ? 60 : 110;
} else {
  deliveryCost = (deliveryType === "standard") ? 110 : 140;
}

// Step 2d: Calculate total including delivery
const totalCost = cart.reduce((sum, item) => sum + item.price, 0) + deliveryCost;
const orderID = "TR#" + Date.now();
    
db.collection("orders").add({
  orderID,
  name,
  email,
  phone,
  paxiStore,
  items: cart,
  total: totalCost,
  deliveryType: deliveryType,
  packageType: packageType,
  deliveryCost: deliveryCost,
  status: "pending",
  paymentStatus: "unpaid",
  createdAt: firebase.firestore.FieldValue.serverTimestamp()
})
.then(() => {
  localStorage.removeItem("tickorderCart");
  orderStatus.textContent = "Order placed successfully!";
})
.catch((error) => {
  console.error("Error placing order:", error);
  orderStatus.textContent = "Failed to place order. Try again.";
});

});
</script>

</body>
</html>
