<!DOCTYPE html>
<html>
<head>
  <title>TickOrder Admin</title>
</head>
<body>

<h2>Admin - Orders</h2>
<div id="orders"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  
<script>
  const firebaseConfig = {
  apiKey: "AIzaSyBhDQeyV9_REmBi0zjQQyawkDoaX7Ho544",
  authDomain: "tickorder-13b84.firebaseapp.com",
  projectId: "tickorder-13b84",
  storageBucket: "tickorder-13b84.firebasestorage.app",
  messagingSenderId: "288232701324",
  appId: "1:288232701324:web:ae43423dacecd9508f6aa9"
};

  firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

const ordersDiv = document.getElementById("orders");

auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "login.html";
  } else {

    // Only load orders if logged in
    db.collection("orders")
      .orderBy("createdAt", "desc")
      .onSnapshot(snapshot => {
        ordersDiv.innerHTML = "";
        snapshot.forEach(doc => {
          const order = doc.data();
          ordersDiv.innerHTML += `
  <div style="border:1px solid #000; margin:10px; padding:10px;">
    <p><strong>Name:</strong> ${order.name}</p>
    <p><strong>Email:</strong> ${order.email}</p>
    <p><strong>Address:</strong> ${order.address}</p>
    <p><strong>Total:</strong> $${order.total}</p>
    <p><strong>Status:</strong> ${order.status}</p>
    <p><strong>Payment:</strong> ${order.paymentStatus}</p>
    <button onclick="markShipped('${doc.id}')">Mark as Shipped</button>
  </div>
`;
        });
      });

  }
});
function markShipped(orderId) {
  db.collection("orders").doc(orderId).update({
    status: "shipped"
  });
}
  
</script>

</body>
</html>
