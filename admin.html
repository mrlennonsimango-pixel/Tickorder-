<!DOCTYPE html>
<html>
<head>
  <title>TickOrder Admin</title>
</head>
<body>

<h2>Admin - Orders</h2>
  
  <div style="margin-bottom:20px;">
  <button onclick="loadOrders('all')">All</button>
  <button onclick="loadOrders('pending')">Pending</button>
  <button onclick="loadOrders('shipped')">Shipped</button>
  <button onclick="loadOrders('delivered')">Delivered</button>
  <button onclick="loadOrders('unpaid')">Unpaid</button>
</div>

  <h3>Dashboard</h3>
<p><strong>Total Orders:</strong> <span id="totalOrders">0</span></p>
<p><strong>Paid Revenue:</strong> $<span id="paidRevenue">0</span></p>
<p><strong>Unpaid Revenue:</strong> $<span id="unpaidRevenue">0</span></p>
<hr>
  
<div id="orders"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  
  <script>
  const firebaseConfig = {
    apiKey: "AIzaSyBhDQeyV9_REmBi0zjQQyawkDoaX7Ho544",
    authDomain: "tickorder-13b84.firebaseapp.com",
    projectId: "tickorder-13b84",
    storageBucket: "tickorder-13b84.firebasestorage.app",
    messagingSenderId: "288232701324",
    appId: "1:288232701324:web:ae43423dacecd9508f6aa9"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const auth = firebase.auth();
  const ordersDiv = document.getElementById("orders");

  // ✅ FILTER FUNCTION (GLOBAL)
function loadOrders(filter) {

  let query;

  if (filter === "all") {
    query = db.collection("orders")
              .orderBy("createdAt", "desc");
  } 
  else if (filter === "unpaid") {
    query = db.collection("orders")
              .where("paymentStatus", "==", "unpaid");
  } 
  else {
    query = db.collection("orders")
              .where("status", "==", filter);
  }

  query.get().then(snapshot => {
    updateDashboard(snapshot);
    ordersDiv.innerHTML = "";

    snapshot.forEach(doc => {
      const order = doc.data();

      ordersDiv.innerHTML += `
        <div style="border:1px solid #000; margin:10px; padding:10px;">
          <p><strong>Name:</strong> ${order.name}</p>
          <p><strong>Email:</strong> ${order.email}</p>
          <p><strong>Address:</strong> ${order.address}</p>
          <p><strong>Total:</strong> $${order.total}</p>
          <p><strong>Status:</strong> ${order.status}</p>
          <p><strong>Payment:</strong> ${order.paymentStatus}</p>

          <button onclick="markShipped('${doc.id}')">Mark as Shipped</button>
          <button onclick="markDelivered('${doc.id}')">Mark as Delivered</button>
          <button onclick="markPaid('${doc.id}')">Mark as Paid</button>
        </div>
      `;
    });
  })
  .catch(error => {
    console.error("Query error:", error);
  });
}

  // ✅ UPDATE FUNCTIONS
  function markShipped(orderId) {
    db.collection("orders").doc(orderId).update({ status: "shipped" });
  }

  function markDelivered(orderId) {
    db.collection("orders").doc(orderId).update({ status: "delivered" });
  }

  function markPaid(orderId) {
    db.collection("orders").doc(orderId).update({ paymentStatus: "paid" });
  }

    function updateDashboard(snapshot) {

  let totalOrders = 0;
  let paidRevenue = 0;
  let unpaidRevenue = 0;

  snapshot.forEach(doc => {
    const order = doc.data();
    totalOrders++;

    if (order.paymentStatus === "paid") {
      paidRevenue += Number(order.total);
    } else {
      unpaidRevenue += Number(order.total);
    }
  });

  document.getElementById("totalOrders").innerText = totalOrders;
  document.getElementById("paidRevenue").innerText = paidRevenue;
  document.getElementById("unpaidRevenue").innerText = unpaidRevenue;
}
  // ✅ AUTH CHECK
  auth.onAuthStateChanged(user => {
    if (!user) {
      window.location.href = "login.html";
    } else {
      loadOrders("all");
    }
  });
</script>

</body>
</html>
