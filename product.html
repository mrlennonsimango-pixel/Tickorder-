<!DOCTYPE html>
<html>
<head>
  <title>Product Details - TickOrder</title>
  <link rel="stylesheet" href="style.css">
  <script src="product.js"></script>
</head>
<body>

<header>
  <h1>TickOrder</h1>
  <nav>
    <a href="index.html" class="back-btn">⬅ Back</a>
    <a href="cart.html" id="cart-link">🛒 <span id="cart-count">0</span></a>
  </nav>
</header>

<!-- Floating cart -->
<div id="floating-cart">
  <a href="cart.html">
    <i class="fa-solid fa-cart-shopping"></i>
    <span id="floating-cart-count">0</span>
  </a>
</div>

<!-- Toast -->
<div id="toast"></div>

<div id="product-details" class="product-details"></div>

<script>
// ==========================
// LOAD PRODUCT ON PRODUCT PAGE
// ==========================

// Get the product id saved from the homepage click
const productId = Number(localStorage.getItem("selectedProduct"));

// Find the product in the products array
const product = products.find(p => p.id === productId);

// Container where product details will be displayed
const container = document.getElementById("product-details");

if (product) {
  // --- Display product details ---
  container.innerHTML = `
    <h2 class="product-title">${product.name}</h2>

    <!-- Product image -->
    <img id="main-product-img" src="${product.image}" alt="${product.name}">

    <!-- Product description -->
    <p>${product.description || "No description available."}</p>

    <!-- Product price -->
    <p class="price">Price: R${product.price}</p>

    <!-- Add to Cart & Buy Now buttons -->
    <button onclick="addToCart(${product.id})">Add to Cart</button>
    <button onclick="buyNow(${product.id})">Buy Now</button>
  `;
} else {
  // If product not found
  container.innerHTML = "<p>Product not found</p>";
}

// ==========================
// ADD TO CART FUNCTION
// ==========================
function addToCart(id) {
  const cart = JSON.parse(localStorage.getItem("tickorderCart")) || [];
  const product = products.find(p => p.id === id);

  cart.push({
    id: product.id,
    name: product.name,
    image: product.image,
    price: product.price,
    color: product.color || "Default"
  });

  localStorage.setItem("tickorderCart", JSON.stringify(cart));

  // Update cart counters
  document.getElementById("cart-count").textContent = cart.length;
  document.getElementById("floating-cart-count").textContent = cart.length;

  // Show toast notification
  const toast = document.getElementById("toast");
  toast.textContent = `${product.name} added to cart`;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2000);
}

// ==========================
// BUY NOW FUNCTION
// ==========================
function buyNow(id) {
  const product = products.find(p => p.id === id);
  const cart = [{
    id: product.id,
    name: product.name,
    image: product.image,
    price: product.price,
    color: product.color || "Default"
  }];
  localStorage.setItem("tickorderCart", JSON.stringify(cart));
  window.location.href = "checkout.html";
}

// ==========================
// INITIALIZE CART COUNTERS
// ==========================
const initialCart = JSON.parse(localStorage.getItem("tickorderCart")) || [];
document.getElementById("cart-count").textContent = initialCart.length;
document.getElementById("floating-cart-count").textContent = initialCart.length;
</script>
</body>
</html>
