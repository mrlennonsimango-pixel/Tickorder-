<!DOCTYPE html>
<html>
<head>
  <title>Product Details - TickOrder</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="product.js"></script>
</head>
<body>

<header>
  <div class="nav-buttons">
    <a href="javascript:history.back()" class="back-btn">⬅ Back</a>
    <a href="index.html" class="home-btn">🏠 Home</a>
  </div>
  <h1>TickOrder</h1>
  <a href="cart.html" class="cart-link">🛒 <span id="cart-count">0</span></a>
</header>
<!-- Floating cart -->
<div id="floating-cart">
  <a href="cart.html">
    <i class="fa-solid fa-cart-shopping"></i>
    <span id="floating-cart-count">0</span>
  </a>
</div>

<!-- Toast -->
<div id="toast"></div>

<div class="page-container">
  <div id="product-details" class="product-details"></div>
</div>

<script>

  // ===============================
// GLOBAL QUANTITY (used everywhere)
// ===============================
let quantity = 1;
  
// ==========================
// LOAD PRODUCT ON PRODUCT PAGE
// ==========================

// Get the product id saved from the homepage click
const productId = Number(localStorage.getItem("selectedProduct"));

const product = products.find(p => p.id === productId);

const container = document.getElementById("product-details");
// ===============================
// Quantity system (starts at 1)
// This controls how many items user selects
// ===============================

  
if (!product) {
  container.innerHTML = "<p>Product not found</p>";
} else {
// Reset quantity every time product loads
quantity = 1;
  // --- Display product details ---
container.innerHTML = `
  <div class="product-container">
    <!-- Image section -->
    <div class="image-section">
      <img id="main-product-img" src="${product.image}" alt="${product.name}">
    </div>

    <!-- Product info section -->
    <div class="product-info">
      <h2 class="product-title">${product.name}</h2>

      <!-- Price -->
      <p class="price">R${product.price}</p>

      <p class="stock">${product.stock > 0 ? "In Stock" : "Out of Stock"}</p>
   
      <!-- Description -->
      <div class="description-section">
        <p>${product.description || "No description available."}</p>
      </div>

      <!-- Action buttons -->
      <!-- ===============================
Quantity selector
User chooses how many items to buy
=============================== -->
<div class="quantity-box">

  <!-- Decrease quantity -->
  <button onclick="changeQty(-1)">-</button>

  <!-- Show current quantity -->
  <span id="qty">1</span>

  <!-- Increase quantity -->
  <button onclick="changeQty(1)" id="plusBtn">+</button>

</div>
      <div class="buttons">
        <button class="cart-btn" onclick="addToCart(${product.id})">Add to Cart</button>
        <button class="buy-btn" onclick="buyNow(${product.id})">Buy Now</button>
      </div>
    </div>
  </div>
`;
// ===============================
// STEP 2: Smart + button control
// ===============================
setTimeout(() => {

  const plusBtn = document.getElementById("plusBtn");

  if (!plusBtn) return;

  // Disable if no stock
  if (product.stock === 0) {
    plusBtn.disabled = true;
    return;
  }

  // Optional: prepare for future stock limit control
  // (we will connect this with quantity later)

}, 0);
  // ✅ STOCK BLOCK (SAFE HERE)
  if (product.stock === 0) {
    setTimeout(() => {
      document.querySelector(".cart-btn").disabled = true;
      document.querySelector(".buy-btn").disabled = true;
    }, 0);
  }
}
  
// ==========================
// ADD TO CART FUNCTION
// ==========================
function addToCart(id) {
  const cart = JSON.parse(localStorage.getItem("tickorderCart")) || [];
  const product = products.find(p => p.id === id);

  cart.push({
  id: product.id,
  name: product.name,
  image: product.image,
  price: product.price,

  // IMPORTANT: selected quantity
  quantity: quantity,

  // total price for this item
  total: product.price * quantity,

  color: product.color || "Default"
});

  localStorage.setItem("tickorderCart", JSON.stringify(cart));

  // Update cart counters
  document.getElementById("cart-count").textContent = cart.length;
  document.getElementById("floating-cart-count").textContent = cart.length;

  // Show toast notification
  const toast = document.getElementById("toast");
  toast.textContent = `${product.name} added to cart`;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2000);
}

// ==========================
// BUY NOW FUNCTION
// ==========================
function buyNow(id) {
  const product = products.find(p => p.id === id);
  const cart = [{
    id: product.id,
    name: product.name,
    image: product.image,
    price: product.price,
    color: product.color || "Default"
  }];
  localStorage.setItem("tickorderCart", JSON.stringify(cart));
  window.location.href = "checkout.html";
}

function changeQty(value) {

  // safety check
  if (!product) return;

  // update quantity
  quantity += value;

  // minimum limit
  if (quantity < 1) quantity = 1;

  // maximum limit (stock safe)
  if (quantity >= product.stock) {
    quantity = product.stock;

    // OPTIONAL UX FEEDBACK (clean, not alert)
    document.getElementById("toast").textContent = "Max stock reached";
    document.getElementById("toast").classList.add("show");

    setTimeout(() => {
      document.getElementById("toast").classList.remove("show");
    }, 1500);
  }

  // update UI
  document.getElementById("qty").textContent = quantity;
}
// ==========================
// INITIALIZE CART COUNTERS
// ==========================
const initialCart = JSON.parse(localStorage.getItem("tickorderCart")) || [];
document.getElementById("cart-count").textContent = initialCart.length;
document.getElementById("floating-cart-count").textContent = initialCart.length;
</script>
</body>
</html>
