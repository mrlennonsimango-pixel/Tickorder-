<body>

<header>
  <h1>TickOrder</h1>
  <a href="index.html" class="back-btn">⬅ Back</a>
</header>

<div id="product-details" class="product-details"></div>

<script src="product.js"></script>

<script>
  const productId = localStorage.getItem("selectedProduct");
  const product = products.find(p => p.id == productId);

  const container = document.getElementById("product-details");

  if (product) {
    container.innerHTML = `
      <div class="details-container">
        <div class="image-section">
          <img src="${product.image}" alt="${product.name}">
        </div>

        <div class="info-section">
          <h2>${product.name}</h2>
          <p class="price">R${product.price}</p>
          <p class="description">${product.description}</p>

          <div class="buttons">
            <button onclick="addToCart(${product.id})" class="cart-btn">Add to Cart</button>
            <button onclick="buyNow(${product.id})" class="buy-btn">Buy Now</button>
          </div>
        </div>
      </div>
    `;
  } else {
    container.innerHTML = "<p>Product not found</p>";
  }
</script>

<script>
function addToCart(id) {
  let cart = JSON.parse(localStorage.getItem("tickorderCart")) || [];
  const product = products.find(p => p.id === id);
  cart.push(product);
  localStorage.setItem("tickorderCart", JSON.stringify(cart));
  alert("Added to cart");
}

function buyNow(id) {
  let cart = [];
  const product = products.find(p => p.id === id);
  cart.push(product);
  localStorage.setItem("tickorderCart", JSON.stringify(cart));
  window.location.href = "checkout.html";
}
</script>

</body>
