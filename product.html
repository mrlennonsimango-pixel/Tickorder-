<!DOCTYPE html>
<html>
<head>
  <title>Product Details - TickOrder</title>
  <link rel="stylesheet" href="style.css">
  <script src="product.js"></script>
</head>
<body>

<header>
  <h1>TickOrder</h1>
  <nav>
    <a href="index.html" class="back-btn">⬅ Back</a>
    <a href="cart.html" id="cart-link">🛒 <span id="cart-count">0</span></a>
  </nav>
</header>

<!-- Floating cart -->
<div id="floating-cart">
  <a href="cart.html">
    <i class="fa-solid fa-cart-shopping"></i>
    <span id="floating-cart-count">0</span>
  </a>
</div>

<!-- Toast -->
<div id="toast"></div>

<div id="product-details" class="product-details"></div>

<script>
  const productId = localStorage.getItem("selectedProduct");
  const product = products.find(p => p.id == productId);
  const container = document.getElementById("product-details");

  if (product) {
    // JS logic outside the template
    let selectedColorIndex = Number(localStorage.getItem("selectedColorIndex")) || 0;
    const color = product.colors[selectedColorIndex];

    container.innerHTML = `
      <h2 class="product-title">${product.name}</h2>

      <div class="image-section">
        <img id="main-product-img" src="${color.image}" alt="${product.name}">

        <!-- Vertical color selector -->
        <div class="color-section-vertical">
          ${product.colors.map((c, i) => `
            <button class="color-btn ${i === selectedColorIndex ? 'active' : ''}"
              onclick="selectColor(${i})"
              title="${c.name}"
              style="background-color:${c.name.toLowerCase()}">
            </button>
          `).join('')}
        </div>
      </div>

      <div class="description-section">
        <h3>Description</h3>
        <p>${product.description || "No description available."}</p>
        <p class="price">Price: R<span id="product-price">${color.price}</span></p>
      </div>

      <div class="buttons">
        <button onclick="addToCart(${product.id})" class="cart-btn">Add to Cart</button>
        <button onclick="buyNow(${product.id})" class="buy-btn">Buy Now</button>
      </div>
    `;
  } else {
    container.innerHTML = "<p>Product not found</p>";
  }

  // Add to Cart
  function addToCart(id) {
    let cart = JSON.parse(localStorage.getItem("tickorderCart")) || [];
    const product = products.find(p => p.id === id);

    const index = Number(localStorage.getItem("selectedColorIndex")) || 0;
    const selectedColor = product.colors[index];

    cart.push({
      id: product.id,
      name: product.name,
      image: selectedColor.image,
      price: selectedColor.price,
      color: selectedColor.name
    });

    localStorage.setItem("tickorderCart", JSON.stringify(cart));

    // Update counters
    document.getElementById("cart-count").textContent = cart.length;
    document.getElementById("floating-cart-count").textContent = cart.length;

    // Toast notification
    const toast = document.getElementById("toast");
    toast.textContent = `${product.name} (${selectedColor.name}) added to cart`;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2000);

    // Fly-to-cart animation
    const productImg = document.querySelector(".image-section img");
    const imgClone = productImg.cloneNode(true);
    imgClone.classList.add("flying-img");

    const imgRect = productImg.getBoundingClientRect();
    const cartLink = document.getElementById("cart-link");
    const cartRect = cartLink.getBoundingClientRect();

    imgClone.style.top = `${imgRect.top}px`;
    imgClone.style.left = `${imgRect.left}px`;
    imgClone.style.width = `${imgRect.width}px`;
    imgClone.style.height = `${imgRect.height}px`;
    imgClone.style.position = "absolute";
    imgClone.style.transition = "all 0.7s ease";

    document.body.appendChild(imgClone);

    requestAnimationFrame(() => {
      imgClone.style.top = `${cartRect.top}px`;
      imgClone.style.left = `${cartRect.left}px`;
      imgClone.style.width = `20px`;
      imgClone.style.height = `20px`;
      imgClone.style.opacity = 0.5;
    });

    imgClone.addEventListener("transitionend", () => imgClone.remove());
  }

  // Buy Now
  function buyNow(id) {
    const cart = [];
    const product = products.find(p => p.id === id);
    const index = Number(localStorage.getItem("selectedColorIndex")) || 0;
    const selectedColor = product.colors[index];

    cart.push({
      id: product.id,
      name: product.name,
      image: selectedColor.image,
      price: selectedColor.price,
      color: selectedColor.name
    });

    localStorage.setItem("tickorderCart", JSON.stringify(cart));
    window.location.href = "checkout.html";
  }

  // Initialize cart counters on page load
  const initialCart = JSON.parse(localStorage.getItem("tickorderCart")) || [];
  document.getElementById("cart-count").textContent = initialCart.length;
  document.getElementById("floating-cart-count").textContent = initialCart.length;

  // Select Color
  function selectColor(index) {
    const product = products.find(p => p.id == productId);
    const color = product.colors[index];

    document.getElementById("main-product-img").src = color.image;
    document.getElementById("product-price").textContent = color.price;

    document.querySelectorAll(".color-btn").forEach((btn, i) => {
      btn.classList.toggle("active", i === index);
    });

    localStorage.setItem("selectedColorIndex", index);
  }
</script>

</body>
</html>
